name: 📚 Documentation issue
description: Report missing/incorrect documentation for super_button_package
title: "[DOCS] "
labels: ["documentation", "needs-triage"]
body:
  - type: dropdown
    id: doc_area
    attributes:
      label: Which doc?
      options:
        - doc/PHASE_1_SETUP.md
        - doc/PHASE_2_PACKAGE_AND_EXAMPLES.md
        - doc/PHASE_3_PUBLISHING.md
        - README.md
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What’s wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      placeholder: Provide the text you’d like to add/change, or outline what should be clarified.
    validations:
      required: false

