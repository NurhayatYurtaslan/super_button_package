name: super_button_package
description: >-
  Composable button widget (SuperButton) with a typed style model and
  pluggable effect stack; includes an example showcase app.
version: 0.1.0
homepage: https://github.com/NurhayatYurtaslan/super_button_package
repository: https://github.com/NurhayatYurtaslan/super_button_package
issue_tracker: https://github.com/NurhayatYurtaslan/super_button_package/issues
documentation: https://pub.dev/documentation/super_button_package/latest/
topics:
  - widgets
  - button
  - ui
  - design-system

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

